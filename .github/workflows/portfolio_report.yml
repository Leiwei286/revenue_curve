name: Portfolio Report

on:
  workflow_dispatch:

  schedule:
    # 北京时间 15:30
    - cron: "00 8 * * 1-5"

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run portfolio script
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          SKIP_TIME_CHECK: "1"
        run: |
          python run_portfolio.py 2>&1 | tee portfolio.log

      - name: Send email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python send_email.py

      - name: Commit updated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add portfolio_history.csv \
                  portfolio_detail_latest.csv \
                  portfolio_pnl_ratio_curve.png \
                  latest_summary.json

          git diff --cached --quiet || git commit -m "Update portfolio report"

          git pull --rebase origin main
          git push origin HEAD:main
